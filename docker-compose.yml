services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/backend/data
    environment:
      - DATABASE_URL=sqlite:////app/backend/data/followup_demo.db
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
volumes:
  backend_data:
